version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: omarket_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: omarket_monitor
      POSTGRES_USER: omarket
      POSTGRES_PASSWORD: omarket_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omarket -d omarket_monitor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: omarket_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
